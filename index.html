<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Whispr | رسائل مجهولة</title>
  <meta name="description" content="استقبل رسائل مجهولة من أصدقائك ومتابعيك.">
  <meta name="theme-color" content="#0A0A0A">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M5 5h14a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H10l-4 3.5V16H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z'/%3E%3Cpath d='M7.5 9.5h9'/%3E%3Cpath d='M7.5 12.5h5'/%3E%3C/svg%3E">
  <script>(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('whispr_theme')||'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Background -->
  <div class="bg-gradient"></div>
  <div class="particles" id="particles"></div>

  <!-- Custom Cursor (desktop) -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursor-follower"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo" onclick="app.navigate('home')" role="button" tabindex="0" aria-label="الصفحة الرئيسية">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 5h14a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H10l-4 3.5V16H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"/>
          <path d="M7.5 9.5h9"/>
          <path d="M7.5 12.5h5"/>
        </svg>
        <span>Whispr</span>
      </div>

      <div class="nav-actions">
        <button id="theme-toggle" class="btn btn-ghost theme-btn icon-only" aria-label="تبديل المظهر">
          <span id="theme-icon"></span>
        </button>
        <div id="auth-nav-container"></div>
      </div>
    </div>
  </nav>

  <!-- App Root -->
  <main id="app-root" class="page-container"></main>

  <!-- Toast Notifications -->
  <div id="toast-container" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
